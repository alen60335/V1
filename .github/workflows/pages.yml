name: Publish to GitHub Pages

# Pages 以傳統 gh-pages 分支模式服務（首次由手動推 gh-pages 自動啟用）。
# 此 workflow 在 push 時把分支內容鏡像到 gh-pages，讓線上版保持最新。
on:
  push:
    branches:
      - main
      - claude/progressive-element-unlock-2etdte
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Mirror branch to gh-pages
        run: git push origin -f HEAD:gh-pages
